version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pulsechat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulsechat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsechat_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pulsechat}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pulsechat}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulsechat-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-pulsechat_redis}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-pulsechat_redis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
